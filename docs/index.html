<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Legacy</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>The Legacy</h1>
        <p class="tagline">An AI assistant for Magic: The Gathering</p>
        <nav class="tabs">
            <button class="tab-btn active" data-tab="chat">Chat</button>
            <button class="tab-btn" data-tab="import">Import</button>
            <button class="tab-btn" data-tab="goldfish">Goldfish</button>
            <button class="tab-btn" data-tab="budget">Budget</button>
        </nav>
    </header>

    <main>
        <section id="tab-chat" class="tab-panel active">
            <div class="chat-layout">
                <aside class="chat-cards-panel">
                    <div class="chat-cards-header">Cards mentioned</div>
                    <div id="chat-cards-grid" class="card-grid chat-card-grid">
                        <p class="chat-cards-empty">Cards referenced in the conversation will appear here.</p>
                    </div>
                </aside>
                <div class="chat-main">
                    <div id="chat-messages" class="chat-messages"></div>
                    <form id="chat-form" class="chat-form">
                        <textarea id="chat-input" placeholder="Ask anything about Legacy — meta, cards, rules, deck ideas…" rows="2" required></textarea>
                        <button type="submit" id="chat-submit">Send</button>
                    </form>
                </div>
            </div>
        </section>

        <section id="tab-import" class="tab-panel">
            <div class="split">
                <div>
                    <label>Decklist or URL</label>
                    <textarea id="import-input" rows="14" placeholder="4 Brainstorm&#10;4 Ponder&#10;4 Force of Will&#10;4 Underground Sea&#10;…"></textarea>
                    <div class="button-row">
                        <button id="import-parse-btn">Parse</button>
                        <button id="import-analyze-btn" disabled>Analyze</button>
                    </div>
                </div>
                <div id="import-output" class="import-output"></div>
            </div>
        </section>

        <section id="tab-goldfish" class="tab-panel">
            <div class="split">
                <div>
                    <label>Decklist</label>
                    <textarea id="goldfish-input" rows="14" placeholder="Paste decklist"></textarea>
                    <div class="button-row">
                        <button id="goldfish-draw-btn">Draw hand</button>
                        <button id="goldfish-mull-btn" disabled>Mulligan</button>
                        <button id="goldfish-sim-btn">Simulate</button>
                        <button id="goldfish-stats-btn">1000 games</button>
                    </div>
                    <div class="goldfish-status" id="goldfish-status"></div>
                </div>
                <div id="goldfish-output" class="goldfish-output"></div>
            </div>
        </section>

        <section id="tab-budget" class="tab-panel">
            <div class="split">
                <div>
                    <label>Decklist</label>
                    <textarea id="budget-input" rows="14" placeholder="Paste decklist"></textarea>
                    <div class="button-row">
                        <button id="budget-tiers-btn">Generate tiers</button>
                    </div>
                </div>
                <div id="budget-output" class="budget-output"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-info">
            <a href="https://github.com/malFlexion/the-legacy" target="_blank">Source</a>
            · Llama 3.2 1B + LoRA
            · 1,549 training pairs
            · 28.9% → 61.6% eval
            · RAG over 719 rules chunks
            · 36,670 cards indexed
            · Fly.io
            · <span id="footer-boot-time">deployed …</span>
        </div>
        <div class="api-status" title="Backend health">
            <span class="status-dot" id="api-dot"></span>
            <span id="api-health" class="health-unknown">checking…</span>
        </div>
    </footer>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
