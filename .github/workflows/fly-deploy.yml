# Continuous deployment to Fly.io on push to master.
# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/
#
# Requires FLY_API_TOKEN secret in repo Settings → Secrets and variables → Actions.
# Generate with: fly tokens create deploy

name: Fly Deploy

on:
  # Manual-only for now — run from the Actions tab when you're ready to deploy.
  # To re-enable auto-deploy on push, uncomment the push: block below.
  workflow_dispatch:

  # push:
  #   branches: [master]
  #   paths:
  #     - "src/**"
  #     - "data/card_index.pkl"
  #     - "vectordb/**"
  #     - "docs/**"
  #     - "Dockerfile"
  #     - ".dockerignore"
  #     - "fly.toml"
  #     - ".github/workflows/fly-deploy.yml"

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v4
        # vectordb files are git-LFS-style binary blobs; pull the full repo
        with:
          lfs: false
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
