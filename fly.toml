# fly.toml app configuration file generated for the-legacy-api on 2026-04-19T17:29:45-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'the-legacy-api'
primary_region = 'iad'

[build]

[env]
  PORT = '8000'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  # 1GB required: chromadb + sentence-transformers + card_index.pkl add up
  # past 512MB once embeddings are loaded. OOM kills were observed at 512MB.
  memory = '1gb'
