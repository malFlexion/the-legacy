# fly.toml for The Legacy — all-in-one Fly GPU container running Ollama
# alongside the FastAPI server and the static frontend.
#
# One-time setup (before first `fly deploy`):
#   fly volumes create ollama_data --size 10 -r iad
#
# Cost: a10 GPU machine is ~$2.10/hr while running. To stop billing:
#   fly scale count 0 -a the-legacy-api
# Volume continues billing at ~$1.50/mo regardless of machine state.

app = 'the-legacy-api'
primary_region = 'iad'  # GPU availability; 'ord' and 'sjc' also work

[build]

[env]
  PORT = '8000'
  INFERENCE_BACKEND = 'ollama'
  OLLAMA_BASE = 'http://localhost:11434'
  MODEL_NAME = 'the-legacy'
  # Ollama stores models under OLLAMA_MODELS (defaults to ~/.ollama/models);
  # the Fly Volume below mounts /root/.ollama so the model cache persists
  # across deploys and restarts.
  #
  # Ollama runtime tuning for single-user demo workload:
  #  - NUM_PARALLEL=1: don't allocate 4 concurrent inference slots (default),
  #    saves ~800MB of KV cache memory
  #  - MAX_LOADED_MODELS=1: only ever keep `the-legacy` resident
  #  - KEEP_ALIVE=24h: never unload the model mid-demo
  OLLAMA_NUM_PARALLEL = '1'
  OLLAMA_MAX_LOADED_MODELS = '1'
  OLLAMA_KEEP_ALIVE = '24h'

[http_service]
  internal_port = 8000
  force_https = true
  # Keep the machine warm — GPU cold start + Ollama model load is 60-120s,
  # which would ruin a live demo. Run `fly scale count 0` to stop.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[mounts]]
  source = 'ollama_data'
  destination = '/root/.ollama'
  initial_size = '10gb'

[[vm]]
  # 8 dedicated CPU cores — the sweet spot for Q8_0 inference on Llama 3.2 1B.
  # Going higher (16x) hits diminishing returns because memory bandwidth
  # caps throughput, not core count.
  # Demo cost: ~$0.20/hr. Stop between sessions with `fly scale count 0`.
  #
  # When Fly approves GPU access, swap to `size = 'a10'` + `memory = '16gb'`
  # (region must become 'ord' since a10 isn't in iad per Fly's GPU docs).
  size = 'performance-8x'
  memory = '8gb'
