# fly.toml for The Legacy — all-in-one Fly GPU container running Ollama
# alongside the FastAPI server and the static frontend.
#
# One-time setup (before first `fly deploy`):
#   fly volumes create ollama_data --size 10 -r iad
#
# Cost: a10 GPU machine is ~$2.10/hr while running. To stop billing:
#   fly scale count 0 -a the-legacy-api
# Volume continues billing at ~$1.50/mo regardless of machine state.

app = 'the-legacy-api'
primary_region = 'iad'  # GPU availability; 'ord' and 'sjc' also work

[build]

[env]
  PORT = '8000'
  INFERENCE_BACKEND = 'ollama'
  OLLAMA_BASE = 'http://localhost:11434'
  MODEL_NAME = 'the-legacy'
  # Ollama stores models under OLLAMA_MODELS (defaults to ~/.ollama/models);
  # the Fly Volume below mounts /root/.ollama so the model cache persists
  # across deploys and restarts.

[http_service]
  internal_port = 8000
  force_https = true
  # Keep the machine warm — GPU cold start + Ollama model load is 60-120s,
  # which would ruin a live demo. Run `fly scale count 0` to stop.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[mounts]]
  source = 'ollama_data'
  destination = '/root/.ollama'
  initial_size = '10gb'

[[vm]]
  # a10 is the same A10 GPU chip SageMaker's ml.g5.xlarge uses.
  # Alternatives:
  #   'l40s'        — newer/faster, ~$2.50/hr
  #   'a100-40gb'   — ~$3.50/hr, overkill for a 1B model
  size = 'a10'
  memory = '16gb'
