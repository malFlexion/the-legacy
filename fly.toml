# fly.toml app configuration file generated for the-legacy-api on 2026-04-19T17:29:45-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'the-legacy-api'
primary_region = 'iad'

[build]

[env]
  PORT = '8000'
  # Default to the in-process GGUF backend for the single-container demo.
  # Override with `fly secrets set INFERENCE_BACKEND=sagemaker` if switching.
  INFERENCE_BACKEND = 'llamacpp'
  LLAMACPP_N_THREADS = '2'

[http_service]
  internal_port = 8000
  force_https = true
  # No scale-to-zero: loading the 1.3GB GGUF takes 30-60s, which ruins demo UX.
  # Machine stays warm; to stop billing, run `fly scale count 0 -a <app>`.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  # performance-cpu-2x: 2 dedicated CPU cores (~$0.05/hr). Roughly 2-3x
  # faster CPU inference than shared-cpu tiers. 4GB RAM fits the 1.3GB
  # GGUF plus chromadb + sentence-transformers working set comfortably.
  size = 'performance-2x'
  memory = '4gb'
